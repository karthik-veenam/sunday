<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sunday</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0b0b0e;
    --card: #16161a;
    --border: #2a2a35;
    --accent: #8b5cf6;
    --accent2: #a78bfa;
    --text: #f1f0f5;
    --muted: #888;
    --on: #8b5cf6;
    --off: #2a2a35;
    --safe: 0px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overscroll-behavior: none; }
  body { display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 10px;
    padding-top: max(12px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background .3s; flex-shrink: 0; }
  .dot.connected { background: #22c55e; }
  .dot.thinking { background: #f59e0b; animation: pulse 1s infinite; }
  .header-sensors { display: flex; gap: 10px; align-items: center; }
  .sensor { font-size: 13px; color: var(--muted); }
  .sensor span { color: var(--text); font-weight: 500; }

  /* Scroll area */
  .scroll { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 14px; -webkit-overflow-scrolling: touch; }

  /* Sections */
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: .6px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

  /* Device grid */
  .devices { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .device-pill {
    background: var(--off); border-radius: 12px; padding: 10px 10px 9px;
    display: flex; flex-direction: column; gap: 5px; cursor: pointer;
    transition: background .15s, transform .1s; user-select: none; border: 1px solid transparent;
  }
  .device-pill.on { background: rgba(139,92,246,.18); border-color: rgba(139,92,246,.35); }
  .device-pill:active { transform: scale(.95); }
  .device-pill .icon { font-size: 20px; line-height: 1; }
  .device-pill .name { font-size: 11px; font-weight: 500; color: var(--muted); }
  .device-pill.on .name { color: var(--accent2); }
  .device-pill .status { font-size: 10px; color: var(--muted); font-weight: 500; }
  .device-pill.on .status { color: var(--accent2); opacity: .8; }

  /* Suggestions */
  .suggestions { display: flex; flex-direction: column; gap: 8px; }
  .suggestion {
    background: var(--card); border-radius: 14px; padding: 12px 14px;
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    border: 1px solid var(--border); transition: background .15s, transform .1s;
  }
  .suggestion:active { transform: scale(.98); background: rgba(139,92,246,.12); }
  .suggestion .s-icon { font-size: 22px; flex-shrink: 0; }
  .suggestion .s-text { flex: 1; min-width: 0; }
  .suggestion .s-title { font-size: 14px; font-weight: 600; }
  .suggestion .s-sub { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .suggestion .s-arrow { color: var(--muted); font-size: 16px; flex-shrink: 0; }

  /* Status bar */
  .status-bar {
    font-size: 12px; color: var(--muted); padding: 8px 14px 4px;
    display: flex; align-items: center; gap: 6px; flex-shrink: 0; min-height: 28px;
  }
  .status-bar.active { color: var(--accent2); }

  /* Input */
  .input-row {
    display: flex; gap: 8px; padding: 8px 14px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border); flex-shrink: 0; background: var(--bg);
  }
  .cmd-input {
    flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 22px;
    padding: 10px 14px; color: var(--text); font-size: 14px; outline: none;
    transition: border-color .2s;
  }
  .cmd-input:focus { border-color: var(--accent); }
  .cmd-input::placeholder { color: var(--muted); }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
    border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0; transition: opacity .2s;
  }
  .send-btn:disabled { opacity: .4; }
  .send-btn:active { opacity: .75; }

  /* Presence chip */
  .presence { display: flex; gap: 8px; }
  .p-chip {
    display: flex; align-items: center; gap: 5px; background: var(--card);
    border: 1px solid var(--border); border-radius: 20px; padding: 5px 10px;
    font-size: 12px; font-weight: 500;
  }
  .p-chip .p-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .p-chip.home .p-dot { background: #22c55e; }
  .p-chip.away .p-dot { background: var(--muted); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Toast */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 8px 16px; font-size: 13px; opacity: 0;
    transition: opacity .25s, transform .25s; pointer-events: none; white-space: nowrap; z-index: 99;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Empty state */
  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 20px 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="dot" id="dot"></div>
    <span class="header-title">Sunday</span>
  </div>
  <div class="header-sensors">
    <div class="sensor" id="temp-sensor" style="display:none"><span id="temp">—</span>°C</div>
    <div class="sensor" id="hum-sensor" style="display:none">💧<span id="hum">—</span>%</div>
  </div>
</div>

<div class="scroll" id="scroll">

  <!-- Presence -->
  <div>
    <div class="section-label">Presence</div>
    <div class="presence" id="presence-row">
      <div class="p-chip" id="chip-karthik"><div class="p-dot"></div>Karthik</div>
    </div>
  </div>

  <!-- Devices -->
  <div>
    <div class="section-label">Devices</div>
    <div class="devices" id="device-grid">
      <div class="empty">Connecting…</div>
    </div>
  </div>

  <!-- Suggestions -->
  <div id="suggestions-section" style="display:none">
    <div class="section-label">Suggestions</div>
    <div class="suggestions" id="suggestions-list"></div>
  </div>

</div>

<div class="status-bar" id="status-bar">Connecting to Sunday…</div>

<div class="input-row">
  <input class="cmd-input" id="cmd" placeholder="Tell Sunday something…" autocomplete="off" autocorrect="off">
  <button class="send-btn" id="send-btn" disabled>➤</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Telegram Web App setup ─────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Config ─────────────────────────────────────────────────────────────────
const WS_URL = (() => {
  const stored = localStorage.getItem('sunday_ws');
  if (stored) return stored;
  // Default: same host (works when served from Pi via ngrok)
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  return `${proto}://${location.host}/ws`;
})();

// ── Device definitions ─────────────────────────────────────────────────────
const DEVICE_META = {
  'fan':        { icon: '🌀', label: 'Fan' },
  'ac':         { icon: '❄️', label: 'AC' },
  'light 1':    { icon: '💡', label: 'Light 1' },
  'light 2':    { icon: '💡', label: 'Light 2' },
  'cove':       { icon: '🌙', label: 'Cove' },
  'spots':      { icon: '✨', label: 'Spots' },
  'foot lamp':  { icon: '🕯️', label: 'Foot Lamp' },
  'top light':  { icon: '🔆', label: 'Top Light' },
  'panels':     { icon: '🟣', label: 'Panels' },
  'moon':       { icon: '🌕', label: 'Moon' },
  'dashboard':  { icon: '📺', label: 'Strip' },
  'geyser':     { icon: '🚿', label: 'Geyser' },
  'projector':  { icon: '🎬', label: 'Projector' },
  'tv':         { icon: '📺', label: 'TV' },
};

// ── State ──────────────────────────────────────────────────────────────────
let ws, devices = {}, suggestions = [], wsReady = false, reconnectTimer;

// ── WebSocket ──────────────────────────────────────────────────────────────
function connect() {
  clearTimeout(reconnectTimer);
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    wsReady = true;
    setDot('connected');
    setStatus('');
    document.getElementById('send-btn').disabled = false;
  };

  ws.onclose = () => {
    wsReady = false;
    setDot('');
    setStatus('Reconnecting…');
    document.getElementById('send-btn').disabled = true;
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = e => {
    try { handleEvent(JSON.parse(e.data)); } catch {}
  };
}

function handleEvent(ev) {
  switch (ev.type) {
    case 'context':
      if (ev.temp != null) { document.getElementById('temp').textContent = ev.temp; document.getElementById('temp-sensor').style.display = ''; }
      if (ev.humidity != null) { document.getElementById('hum').textContent = ev.humidity; document.getElementById('hum-sensor').style.display = ''; }
      if (ev.devices) { devices = ev.devices; renderDevices(); }
      if (ev.presence != null) { updatePresence(ev.presence); }
      break;
    case 'suggestions':
      if (ev.items?.length) { suggestions = ev.items; renderSuggestions(); }
      break;
    case 'wake':
      setStatus('🎤 Listening…', true); break;
    case 'transcribing':
      setStatus('✍️ Transcribing…', true); break;
    case 'thinking':
      setDot('thinking');
      setStatus('💭 Thinking…', true); break;
    case 'transcript':
      setStatus(`You: ${ev.text}`, true); break;
    case 'idle':
      setDot('connected'); setStatus('', false); break;
  }
}

// ── Render devices ─────────────────────────────────────────────────────────
function renderDevices() {
  const grid = document.getElementById('device-grid');
  const keys = Object.keys(devices);
  if (!keys.length) { grid.innerHTML = '<div class="empty">No devices</div>'; return; }

  grid.innerHTML = keys.map(name => {
    const on = devices[name] === 'on';
    const meta = DEVICE_META[name] || { icon: '🔌', label: cap(name) };
    return `<div class="device-pill ${on ? 'on' : ''}" data-device="${name}" data-on="${on}" onclick="toggleDevice(this)">
      <div class="icon">${meta.icon}</div>
      <div class="name">${meta.label}</div>
      <div class="status">${on ? 'On' : 'Off'}</div>
    </div>`;
  }).join('');
}

function toggleDevice(el) {
  const device = el.dataset.device;
  const curOn = el.dataset.on === 'true';
  const action = curOn ? 'off' : 'on';
  // Optimistic update
  el.classList.toggle('on', !curOn);
  el.dataset.on = String(!curOn);
  el.querySelector('.status').textContent = !curOn ? 'On' : 'Off';
  devices[device] = action;
  // Send to Pi
  fetch('/device', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({device, action}) })
    .then(r => r.text()).then(t => toast(t))
    .catch(() => toast('Command failed'));
}

// ── Render suggestions ─────────────────────────────────────────────────────
function renderSuggestions() {
  const sec = document.getElementById('suggestions-section');
  const list = document.getElementById('suggestions-list');
  if (!suggestions.length) { sec.style.display = 'none'; return; }
  sec.style.display = '';
  list.innerHTML = suggestions.map((s, i) =>
    `<div class="suggestion" onclick="runSuggestion(${i})">
      <div class="s-icon">${s.icon || '⚡'}</div>
      <div class="s-text">
        <div class="s-title">${s.title}</div>
        <div class="s-sub">${s.subtitle || s.reason || ''}</div>
      </div>
      <div class="s-arrow">›</div>
    </div>`
  ).join('');
}

function runSuggestion(i) {
  const s = suggestions[i];
  if (!s || !wsReady) return;
  ws.send(JSON.stringify({ type: 'command', text: s.command }));
  toast(`Running: ${s.title}`);
}

// ── Send command ───────────────────────────────────────────────────────────
document.getElementById('cmd').addEventListener('keydown', e => { if (e.key === 'Enter') sendCmd(); });
document.getElementById('send-btn').addEventListener('click', sendCmd);

function sendCmd() {
  const input = document.getElementById('cmd');
  const text = input.value.trim();
  if (!text || !wsReady) return;
  ws.send(JSON.stringify({ type: 'command', text }));
  input.value = '';
  setStatus(`Sent: ${text}`, true);
}

// ── Presence ───────────────────────────────────────────────────────────────
function updatePresence(home) {
  const chip = document.getElementById('chip-karthik');
  chip.className = 'p-chip ' + (home ? 'home' : 'away');
  chip.querySelector('.p-dot').style.background = home ? '#22c55e' : '#666';
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function setDot(state) {
  const d = document.getElementById('dot');
  d.className = 'dot' + (state ? ' ' + state : '');
}
function setStatus(text, active = false) {
  const s = document.getElementById('status-bar');
  s.textContent = text;
  s.className = 'status-bar' + (active ? ' active' : '');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ── Start ──────────────────────────────────────────────────────────────────
connect();
</script>
</body>
</html>
